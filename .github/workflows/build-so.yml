name: Construir WhaleOS ARM64 ISO

on:
  push:
    branches: [ "main" ]

jobs:
  build-whaleos:
    runs-on: ubuntu-latest
    
    steps:
      - name: Clonar Repositório
        uses: actions/checkout@v4

      - name: Instalar Dependências do Host
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-user-static \
            binfmt-support \
            squashfs-tools \
            xorriso \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            dosfstools \
            python3-pip \
            wget ca-certificates
          
      - name: Configurar Ambiente Python para Geração de Ativos
        run: |
          pip3 install Pillow --break-system-packages

      - name: Baixar Rootfs Base Ubuntu 20.04 ARM64
        run: |
          # Ubuntu Base 20.04 ARM64 - Fonte OFICIAL e IMUTÁVEL da Canonical
          ROOTFS_URL="https://cdimage.ubuntu.com/ubuntu-base/releases/20.04/release/ubuntu-base-20.04.6-base-arm64.tar.gz"
          
          echo "Baixando Ubuntu Base 20.04 ARM64 oficial..."
          if ! wget --tries=3 --timeout=60 -q "$ROOTFS_URL" -O rootfs.tar.gz; then
            echo "::error::Falha ao baixar rootfs da Canonical."
            exit 1
          fi
          
          # Validação de integridade (Ubuntu Base ARM64 tem ~30MB)
          FILE_SIZE=$(stat -c%s rootfs.tar.gz)
          if [ "$FILE_SIZE" -lt 25000000 ]; then
            echo "::error::Arquivo corrompido (${FILE_SIZE} bytes)"
            rm -f rootfs.tar.gz
            exit 1
          fi
          
          mkdir -p ./rootfs
          sudo tar -xzf rootfs.tar.gz -C ./rootfs
          rm rootfs.tar.gz
          echo "Rootfs Ubuntu Base extraído: $(du -sh ./rootfs | cut -f1)"

      - name: Gerar Ativos Procedurais (Ícones e Wallpaper)
        run: |
          python3 generate_assets.py

      - name: Preparar Ambiente Chroot e Executar Customização
        run: |
          # Copiar binário qemu-aarch64-static para dentro do rootfs
          sudo cp /usr/bin/qemu-aarch64-static ./rootfs/usr/bin/
          
          # Garantir que o script de customização e o wallpaper estejam acessíveis
          sudo cp customize.sh ./rootfs/tmp/customize.sh
          sudo chmod +x ./rootfs/tmp/customize.sh
          
          # Se existir um wallpaper.jpg na raiz do repositório, copiar para o chroot
          if [ -f "./wallpaper.jpg" ]; then
            sudo cp ./wallpaper.jpg ./rootfs/tmp/wallpaper.jpg
          fi

          # Executar o script de customização dentro do chroot ARM64
          sudo chroot ./rootfs /tmp/customize.sh
          
          # Limpeza pós-chroot
          sudo rm -f ./rootfs/usr/bin/qemu-aarch64-static
          sudo rm -f ./rootfs/tmp/customize.sh
          sudo rm -f ./rootfs/tmp/wallpaper.jpg

      - name: Empacotar Sistema e Gerar ISO Bootável
        run: |
          mkdir -p ./iso-staging/live
          
          # Compactar o rootfs modificado em formato squashfs
          sudo mksquashfs ./rootfs ./iso-staging/live/filesystem.squashfs -comp xz -e boot dev proc sys tmp run media mnt
          
          # Criar estrutura GRUB para boot EFI e Legacy
          mkdir -p ./iso-staging/boot/grub
          cat <<EOF > ./iso-staging/boot/grub/grub.cfg
          set timeout=5
          set default=0
          menuentry "WhaleOS ARM64" {
              linux /boot/vmlinuz root=/dev/ram0 rw quiet splash
              initrd /boot/initrd.img
          }
          EOF
          
          # Placeholders para kernel/initrd (necessários para estrutura ISO válida)
          touch ./iso-staging/boot/vmlinuz ./iso-staging/boot/initrd.img

          # Gerar ISO híbrida com xorriso
          xorriso -as mkisofs \
            -r -V "WhaleOS" \
            -b boot/grub/grub.cfg \
            -no-emul-boot \
            -boot-load-size 4 \
            -boot-info-table \
            --grub2-boot-info \
            -o WhaleOS-ARM64.iso \
            ./iso-staging

      - name: Publicar Artefato da ISO
        uses: actions/upload-artifact@v4
        with:
          name: WhaleOS-ARM64-ISO
          path: WhaleOS-ARM64.iso
          retention-days: 7
